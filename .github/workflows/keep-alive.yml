name: Supabase Auto Keep-Alive

on:
  schedule:
    # Runs at 00:00 UTC (07:00 WIB) every 3 days
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep-Alive direct ping to Supabase Database
        run: |
          echo "Sending HTTP request directly to Supabase REST API..."
          curl -i -X GET "https://fxvczffccdgbjremsczw.supabase.co/rest/v1/settings?select=id" \
            -H "apikey: sb_publishable_HNi9HXZgQ1vQfyFfuK5Q7g_TKzqc5aY" \
            -H "Authorization: Bearer sb_publishable_HNi9HXZgQ1vQfyFfuK5Q7g_TKzqc5aY"
          echo ""
          echo "Direct database heartbeat successfully registered!"

      - name: Keep-Alive indirect ping via Public Website URL
        run: |
          echo "Sending HTTP request to public dynamic sitemap/homepage..."
          curl -i -X GET "https://masandigital.com" | head -n 15
          echo ""
          echo "Public frontpage heartbeat successfully registered!"
